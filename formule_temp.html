<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset='utf-8'>
<title>OPTIM KPI Catalog</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
*{box-sizing:border-box;}
html,body{margin:0;}
body{font-family:Segoe UI,sans-serif; padding:30px; background:linear-gradient(135deg,#FF7900,#ff8c1a,#ff6600); min-height:100vh;}
.container{background:white; max-width:1100px; margin:0 auto; padding:30px 40px; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.2);}
h1{color:#0F172A; font-size:28px; margin:0 0 10px; font-weight:900;}
.pills{margin-bottom:20px;}
.pill{display:inline-block; padding:6px 16px; border-radius:14px; font-size:13px; font-weight:bold; margin-right:6px;}
.pill-light{background:#F1F5F9; color:#0F172A;}
.pill-dark{background:#0F172A; color:white;}
.pill-outline{background:white; color:#0F172A; border:2px solid #0F172A;}
.label{color:#64748B; font-size:11px; font-weight:bold; letter-spacing:1.5px; margin:20px 0 8px;}
.formula{background:#F1F5F9; padding:16px 20px; border-radius:12px; height:130px; overflow:auto; border-left:6px solid #FF7900; font-size:14px;}
.formula-groupe{border-left-color:#22C55E;}
.formula .katex{font-size:0.95em !important;}
.formula .katex-display{margin:0.3em 0 !important;}
.formula::-webkit-scrollbar{width:12px; height:12px;}
.formula::-webkit-scrollbar-track{background:#E2E8F0; border-radius:6px;}
.formula::-webkit-scrollbar-thumb{background:#FF7900; border-radius:6px; border:2px solid #E2E8F0;}
.formula::-webkit-scrollbar-thumb:hover{background:#ff6600;}
.formula-groupe::-webkit-scrollbar-thumb{background:#22C55E; border:2px solid #E2E8F0;}
.formula-groupe::-webkit-scrollbar-thumb:hover{background:#16A34A;}
.formula::-webkit-scrollbar-corner{background:#E2E8F0;}
.raw{font-family:Consolas,monospace; font-size:11px; color:#94A3B8; margin-top:6px; padding:6px 12px; background:#F8FAFC; border-radius:6px; word-break:break-all;}
</style>
</head>
<body>
<div class='container'>
  <h1 id='name'></h1>
  <div class='pills'>
    <span class='pill pill-light' id='filiale'></span>
    <span class='pill pill-dark' id='vendor'></span>
    <span class='pill pill-outline' id='techno'></span>
  </div>
  <div class='label'>FORMULE UTILISÃ‰E (SCRIPT PYTHON)</div>
  <div class='formula' id='used'></div>
  <div class='raw' id='usedRaw'></div>
  <div class='label'>FORMULE GROUPE OFFICIELLE</div>
  <div class='formula formula-groupe' id='groupe'></div>
  <div class='raw' id='groupeRaw'></div>
</div>
<script>
function toLatex(s) {
  if (!s) return '';
  
  // Step 1: Wrap identifiers (with dots/underscores) in \text{}
  s = s.replace(/[A-Za-z][A-Za-z0-9_.]*/g, function(m) {
    if (/^\d+$/.test(m)) return m;
    return '\\text{' + m.replace(/_/g, '\\_') + '}';
  });
  
  // Step 2: Replace * with \cdot
  s = s.replace(/\s*\*\s*/g, ' \\cdot ');
  
  // Step 3: Handle (X)/(Y) iteratively
  for (let i = 0; i < 10; i++) {
    const ns = s.replace(/\(\s*([^()]+?)\s*\)\s*\/\s*\(\s*([^()]+?)\s*\)/g, '\\tfrac{$1}{$2}');
    if (ns === s) break;
    s = ns;
  }
  
  // Step 4: Define a "term" = \text{X} optionally followed by (...) for function calls
  // Patterns: \text{X}, \text{X}(\text{Y}), \text{X}(anything)
  const TERM = '\\\\text\\{[^}]+\\}(?:\\([^()]*\\))?';
  
  // Step 5: Match term/term, term/number, number/term â€” repeat for chained divisions
  for (let i = 0; i < 5; i++) {
    const before = s;
    s = s.replace(new RegExp('(' + TERM + ')\\s*\\/\\s*(' + TERM + ')', 'g'), '\\tfrac{$1}{$2}');
    s = s.replace(new RegExp('(' + TERM + ')\\s*\\/\\s*(\\d+(?:\\.\\d+)?)', 'g'), '\\tfrac{$1}{$2}');
    s = s.replace(new RegExp('(\\d+(?:\\.\\d+)?)\\s*\\/\\s*(' + TERM + ')', 'g'), '\\tfrac{$1}{$2}');
    if (s === before) break;
  }
  
  return s;
}

function render() {
  if (typeof katex === 'undefined') { setTimeout(render, 100); return; }
  const p = new URLSearchParams(window.location.search);
  const used = p.get('used') || '';
  const groupe = p.get('groupe') || '';
  document.getElementById('usedRaw').textContent = used;
  document.getElementById('groupeRaw').textContent = groupe;
  try { katex.render(toLatex(used), document.getElementById('used'), {throwOnError:false, displayMode:true}); } catch(e){ document.getElementById('used').textContent = used; }
  try { katex.render(toLatex(groupe), document.getElementById('groupe'), {throwOnError:false, displayMode:true}); } catch(e){ document.getElementById('groupe').textContent = groupe; }
}

window.addEventListener('DOMContentLoaded', () => {
  const p = new URLSearchParams(window.location.search);
  document.title = (p.get('name') || 'KPI') + ' - OPTIM KPI';
  document.getElementById('name').textContent = p.get('name') || '';
  document.getElementById('filiale').textContent = p.get('filiale') || '';
  document.getElementById('vendor').textContent = p.get('vendor') || '';
  document.getElementById('techno').textContent = p.get('techno') || '';
  render();
});
</script>
</body>
</html>
